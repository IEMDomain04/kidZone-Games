<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Kidzone Games | Roblox</title>
    <link rel="icon" type="image/x-icon" href="Assets/site-icon.ico">
    <link href="../public/css/styles.css" rel="stylesheet">
</head>

<body class="w-full h-screen bg-cover bg-fixed bg-no-repeat bg-center "
    style="background-image: url('assets/rb-background.jpg');">

    <div class="w-full h-1/4 flex justify-center items-center space-x-0">
        <a href="index.html">
            <img class="h-40" src="assets/platform icons/chevron-left-solid.png" alt="chevron-left-solid">
        </a>
        <span id="text-stroke-sm" class="font-Jaro text-9xl">DOWNLOAD LINKS</span>
    </div>

    <!-- Windows 10 Download Section Start -->
    <div class="w-full h-1/2 bg-zinc-50/25 grid grid-cols-2 justify-items-center items-center">
        <img class="h-[110%]" src="assets/platform icons/win10.png" alt="win10">
        <div class="w-full h-full font-Jaro flex flex-col justify-center items-center space-y-4 ">
            <div id="text-stroke-sm" class="w-full h-1/2 flex flex-col justify-center items-center space-y-4 font-Jaro">
                <a class="flex justify-center items-center" href="https://www.roblox.com/home" target="_blank">
                    <div class="w-[23rem] h-28 bg-zinc-50/25 absolute rounded-md">
                    </div>
                    <img class="h-[50%] relative" src="assets/other_logo/roblox-logo.png" alt="internet">

                </a>
            </div>
        </div>
    </div>
    <!-- Windows 10 Download Section End -->

    <!-- Android Section Start -->
    <div class="w-full h-3/4 bg-zinc-50/[.10] grid grid-cols-2 justify-items-center items-center">
        <img class="h-1/2" src="assets/platform icons/android.png" alt="android">
        <div class="w-full h-full font-Jaro flex flex-col justify-center items-center space-y-4 ">
            <div id="text-stroke-sm" class="w-full h-1/2 flex flex-col justify-center items-center space-y-4 font-Jaro">
                <a class="flex justify-center items-center"
                    href="https://play.google.com/store/apps/details?id=com.roblox.client&hl=en&pli=1" target="_blank">
                    <div class="w-[23rem] h-28 bg-zinc-50/[.10] absolute rounded-md">
                    </div>
                    <img class="h-[20%] relative" src="assets/other_logo/play-store.png" alt="internet">
                </a>
            </div>
        </div>
    </div>
    <!-- Android Section End -->

    <!-- IOS Section Start -->
    <div class="w-full h-1/2 bg-zinc-50/25 grid grid-cols-2 justify-items-center items-center">
        <img class="h-1/2" src="assets/platform icons/ios.png" alt="android">
        <div class="w-full h-full font-Jaro flex flex-col justify-center items-center space-y-4 ">
            <div id="text-stroke-sm" class="w-full h-1/2 flex flex-col justify-center items-center space-y-4 font-Jaro">
                <a class="flex justify-center items-center" href="https://apps.apple.com/us/app/roblox/id431946152"
                    target="_blank">
                    <div class="w-[23rem] h-28 bg-zinc-50/25 absolute rounded-md">
                    </div>
                    <img class="h-[25%] relative" src="assets/other_logo/apple-store.png" alt="internet">

                </a>
            </div>
        </div>
    </div>
    <!-- IOS Section End -->
</body>

</html>
